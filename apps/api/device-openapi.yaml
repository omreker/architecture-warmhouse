openapi: 3.0.3
info:
  title: Device Service API
  description: API для управления устройствами умного дома
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1

paths:
  /devices/{id}:
    get:
      summary: Получить информацию об устройстве
      description: Возвращает данные устройства по ID устройства
      tags:
        - Devices
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID устройства
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
              examples:
                success:
                  value:
                    id: 1
                    name: "Датчик спальни"
                    type: "temperature"
                    location: "Bedroom"
                    house_id: "12e9421-k31a-v1a6-v52v7-428942816601"
                    value: 24.2
                    unit: "°C"
                    status: "active"
                    last_updated: "2026-01-01T10:00:00Z"
                    created_at: "2026-01-01T08:00:00Z"
        '404':
          description: Устройство не найдено
        '500':
          description: Ошибка сервера

    put:
      summary: Обновить статус устройства
      description: Обновляет параметры устройства
      tags:
        - Devices
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID устройства
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdate'
            examples:
              example:
                value:
                  status: "closed"
                  value: 18.9
      responses:
        '200':
          description: Устройство обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
              examples:
                success:
                  value:
                    id: 1
                    name: "Датчик спальни"
                    type: "temperature"
                    location: "Bedroom"
                    house_id: "12e9421-k31a-v1a6-v52v7-428942816601"
                    value: 18.9
                    unit: "°C"
                    status: "closed"
                    last_updated: "2026-01-02T10:00:00Z"
                    created_at: "2026-01-01T08:00:00Z"
        '404':
          description: Устройство не найдено
        '500':
          description: Ошибка сервера

  /devices/{id}/command:
    post:
      summary: Отправить команду устройству
      description: Отправляет команду на устройство (вкл/выкл, перезагрузка, и т.д.)
      tags:
        - Devices
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID устройства
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCommand'
            examples:
              turn_on:
                summary: Включить устройство
                value:
                  command: "turn_on"
              turn_off:
                summary: Выключить устройство
                value:
                  command: "turn_off"
      responses:
        '200':
          description: Команда выполнена успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
              examples:
                success:
                  value:
                    id: "1gff4a86bd6dz1"
                    status: "Succes"
                    message: "Команда отправлена устройству"
        '404':
          description: Устройство не найдено
        '500':
          description: Ошибка сервера

components:
  schemas:
    Device:
      type: object
      properties:
        id:
          type: integer
          description: Уникальный идентификатор устройства
        name:
          type: string
          description: Название устройства
        type:
          type: string
          description: Тип устройства
        location:
          type: string
          description: Место установки устройства
        house_id:
          type: string
          format: uuid
          description: ID дома
        value:
          type: number
          description: Текущее значение
        unit:
          type: string
          description: Единица измерения
        status:
          type: string
          description: Статус
        last_updated:
          type: string
          format: date-time
          description: Дата обновления
        created_at:
          type: string
          format: date-time
          description: Дата создания

    DeviceUpdate:
      type: object
      description: Данные для обновления устройства
      properties:
        status:
          type: string
          description: Новый статус
        value:
          type: number
          description: Новое значение

    DeviceCommand:
      type: object
      description: Команда для устройства
      required:
        - command
      properties:
        command:
          type: string
          enum:
            - turn_on
            - turn_off
          description: Тип команды
        parameters:
          type: object
          description: Дополнительные параметры команды

    CommandResponse:
      type: object
      description: Ответ на команду
      properties:
        id:
          type: string
          description: ID команды
        status:
          type: string
          enum:
            - Succes
            - Error
          description: Статус выполнения
        message:
          type: string
          description: Сообщение